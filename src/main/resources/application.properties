# ===== Application =====
spring.application.name=MyTrips
server.port=8080
# Version applicative affichable dans l'admin (peut être injectée via APP_VERSION en Docker)
app.version=${APP_VERSION:}

# ===== SQLite (profil local par defaut) =====
spring.datasource.url=jdbc:sqlite:./mytrips.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===== Actuator (Health check for Portainer) =====
management.endpoints.web.exposure.include=health
# 'never' : retourne {"status":"UP"} sans détails d'infra (suffisant pour Portainer)
management.endpoint.health.show-details=never

# ===== Thymeleaf =====
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Ensure Spring MVC formats LocalDate inputs as ISO (yyyy-MM-dd) for <input type="date">
spring.mvc.format.date=yyyy-MM-dd
# ===== Jackson (Jackson 3 / Spring Boot 4 : SCREAMING_SNAKE_CASE) =====
spring.jackson.deserialization.FAIL_ON_UNKNOWN_PROPERTIES=false

# ===== Géo-résolution (carte du monde) =====
# false = résolution locale (bounding boxes, aucun appel réseau)
# true  = API BigDataCloud gratuite (nécessite accès internet)
app.geo.api-enabled=false

# ===== Géocodage inverse (lat/lon → adresse) pour "ici et maintenant" =====
# false = coordonnées GPS (par défaut)
# true  = API Nominatim (OpenStreetMap, gratuit, sans clé API)
# Peut aussi être défini via la variable d'environnement GEOCODING_ENABLED dans Portainer
app.geocoding.enabled=false

# ===== Securite =====
# Identifiants de connexion — CHANGEZ ces valeurs avant tout deploiement !
app.security.username=admin
app.security.password=admin
# Cle secrete pour signer les cookies remember-me — CHANGEZ-LA !
app.security.remember-me-key=mytrips-remember-me-change-me-in-production

# Verrouillage temporaire du compte apres echecs consecutifs de login
app.security.login-lock.max-failures=5
app.security.login-lock.lock-minutes=15

# Rate limit anti-bruteforce pour l'endpoint API key d'export
app.security.api-export-rate-limit.enabled=true
app.security.api-export-rate-limit.max-requests=30
app.security.api-export-rate-limit.window-seconds=60
