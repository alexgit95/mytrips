# ===== PostgreSQL (profil Docker) =====
spring.datasource.url=jdbc:postgresql://db:5432/mytrips
spring.datasource.username=${POSTGRES_USER:mytrips}
spring.datasource.password=${POSTGRES_PASSWORD:mytrips}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===== Securite (override via variables d'environnement Docker) =====
app.security.username=${APP_USERNAME:admin}
app.security.password=${APP_PASSWORD:admin}
app.security.remember-me-key=${APP_REMEMBER_ME_KEY:mytrips-remember-me-change-me-in-production}
