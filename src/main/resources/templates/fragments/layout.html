<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(pageTitle, content, extraHead, extraScripts)"
      lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="theme-color" content="#0d6efd"/>
    <meta name="description" content="MyTrips - Suivi des dépenses et planification de voyages"/>
    <title th:text="${pageTitle != null ? pageTitle + ' – MyTrips' : 'MyTrips'}">MyTrips</title>
    <!-- Favicon & Icons pour mobile -->
    <link rel="icon" type="image/png" th:href="@{/images/logo.png}"/>
    <link rel="apple-touch-icon" th:href="@{/images/logo.png}"/>
    <link rel="manifest" th:href="@{/manifest.json}"/>
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <th:block th:replace="${extraHead}"></th:block>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/trips}">
            <i class="bi bi-airplane-fill me-2"></i>MyTrips
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/trips}">
                        <i class="bi bi-map me-1"></i>Voyages
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/trips/timeline}">
                        <i class="bi bi-clock-history me-1"></i>Frise
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin}">
                        <i class="bi bi-gear me-1"></i>Administration
                    </a>
                </li>
                <!-- Déconnexion -->
                <li class="nav-item ms-lg-2">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-outline-light btn-sm">
                            <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Flash messages -->
<div th:fragment="alerts" class="container mt-3">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- Main content -->
<main class="container py-4">
    <div th:replace="${content}"></div>
</main>

<!-- Footer -->
<footer class="text-center text-muted py-3 mt-auto border-top small">
    MyTrips &copy; 2025 – Gérez vos dépenses de voyage
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<th:block th:replace="${extraScripts}"></th:block>
</body>
</html>
