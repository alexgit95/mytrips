<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Connexion – MyTrips</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.25);
        }
        .login-logo {
            font-size: 2.5rem;
            color: #0d6efd;
        }
        .btn-login {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            border: none;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #0a58ca 0%, #084298 100%);
        }
    </style>
</head>
<body>

<div class="login-card card mx-3">
    <div class="card-body p-4 p-md-5">

        <!-- Logo + titre -->
        <div class="text-center mb-4">
            <div class="login-logo mb-2">
                <i class="bi bi-airplane-fill"></i>
            </div>
            <h1 class="h3 fw-bold text-dark mb-1">MyTrips</h1>
            <p class="text-muted small">Gestion de dépenses de voyage</p>
        </div>

        <!-- Alerte succès (logout) -->
        <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show py-2" role="alert">
            <i class="bi bi-check-circle me-1"></i> Déconnexion réussie.
            <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
        </div>

        <!-- Alerte erreur (bad credentials) -->
        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show py-2" role="alert">
            <i class="bi bi-exclamation-triangle me-1"></i> Identifiant ou mot de passe incorrect.
            <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
        </div>

        <!-- Formulaire -->
        <form th:action="@{/login}" method="post">

            <!-- Token CSRF (Spring Security l'injecte automatiquement) -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">
                    <i class="bi bi-person me-1"></i>Identifiant
                </label>
                <input class="form-control form-control-lg"
                       type="text"
                       id="username"
                       name="username"
                       autocomplete="username"
                       autofocus
                       required/>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">
                    <i class="bi bi-lock me-1"></i>Mot de passe
                </label>
                <input class="form-control form-control-lg"
                       type="password"
                       id="password"
                       name="password"
                       autocomplete="current-password"
                       required/>
            </div>

            <!-- Remember-me 12 mois -->
            <div class="mb-4 form-check">
                <input class="form-check-input"
                       type="checkbox"
                       id="rememberMe"
                       name="remember-me"
                       checked/>
                <label class="form-check-label text-muted" for="rememberMe">
                    Se souvenir de moi <span class="badge bg-secondary ms-1">12 mois</span>
                </label>
            </div>

            <button type="submit" class="btn btn-login btn-primary btn-lg w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
