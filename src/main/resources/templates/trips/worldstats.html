<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr"
      th:replace="~{fragments/layout :: layout(pageTitle='Carte du Monde',
                                               content=~{::content},
                                               extraHead=~{::extraHead},
                                               extraScripts=~{::extraScripts})}">
<head></head>
<body>
<th:block th:fragment="content">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h1 class="h3 mb-0">
            <i class="bi bi-globe-europe-africa me-2 text-primary"></i>Carte du Monde
        </h1>
        <a th:href="@{/trips}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Retour aux voyages
        </a>
    </div>

    <!-- World Map -->
    <div id="worldMap" th:data-markers="${markersJson}"></div>

    <!-- Global summary cards -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center h-100">
                <div class="card-body py-3">
                    <div class="display-5 fw-bold text-primary" th:text="${totalCountries}">0</div>
                    <div class="small text-muted mt-1">
                        <i class="bi bi-flag me-1"></i>Pays visités
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center h-100">
                <div class="card-body py-3">
                    <div class="display-5 fw-bold text-success" th:text="${totalContinents}">0</div>
                    <div class="small text-muted mt-1">
                        <i class="bi bi-globe me-1"></i>Continents
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${#maps.isEmpty(statsByContinent)}" class="text-center py-5 text-muted">
        <i class="bi bi-globe display-1 mb-3 d-block"></i>
        <h4>Aucun pays détecté</h4>
        <p>Ajoutez un pays aux voyages (champ "Pays") ou des localisations aux événements du planificateur.</p>
        <a th:href="@{/trips}" class="btn btn-primary mt-2">
            <i class="bi bi-map me-1"></i>Voir mes voyages
        </a>
    </div>

    <!-- Continent sections -->
    <div th:each="entry : ${statsByContinent}" class="mb-5">

        <!-- Continent header -->
        <div class="d-flex align-items-center mb-3 pb-2 border-bottom">
            <span th:text="${#strings.equals(entry.key,'Europe') ? '🌍' :
                             #strings.equals(entry.key,'Amérique du Nord') ? '🌎' :
                             #strings.equals(entry.key,'Amérique du Sud') ? '🌎' :
                             #strings.equals(entry.key,'Afrique') ? '🌍' :
                             #strings.equals(entry.key,'Asie') ? '🌏' :
                             #strings.equals(entry.key,'Océanie') ? '🌏' : '🌐'}"
                  class="fs-3 me-2"></span>
            <h2 class="h4 mb-0" th:text="${entry.key}">Continent</h2>
            <span class="badge bg-primary ms-3"
                  th:text="${#lists.size(entry.value)} + ' pays'"></span>
        </div>

        <!-- Country flag grid -->
        <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-3">

            <div class="col" th:each="country : ${entry.value}">
                <div class="card h-100 border-0 shadow-sm country-card"
                     th:id="'country-' + ${country.isoCode}"
                     style="cursor:default;">
                    <div class="card-body p-3 text-center">

                        <!-- Flag emoji -->
                        <div class="flag-emoji mb-1" th:text="${country.flag}"
                             style="font-size:2.5rem; line-height:1;">🏳</div>

                        <!-- Country name -->
                        <div class="fw-semibold small" th:text="${country.countryFr}">Pays</div>

                        <!-- Source count badge -->
                        <div class="mt-1">
                            <span class="badge bg-secondary"
                                  th:text="${#lists.size(country.sources)} + ' lieu(x)'"></span>
                        </div>

                        <!-- Department count for France -->
                        <div th:if="${country.isoCode == 'FR' and not #lists.isEmpty(country.subdivisions)}"
                             class="mt-1">
                            <span class="badge bg-info text-dark"
                                  th:text="${#lists.size(country.subdivisions)} + ' dépt(s)'"></span>
                        </div>

                        <!-- State count for USA -->
                        <div th:if="${country.isoCode == 'US' and not #lists.isEmpty(country.subdivisions)}"
                             class="mt-1">
                            <span class="badge bg-warning text-dark"
                                  th:text="${#lists.size(country.subdivisions)} + ' état(s)'"></span>
                        </div>

                    </div>

                    <!-- Collapsible details -->
                    <div th:if="${not #lists.isEmpty(country.sources) or not #lists.isEmpty(country.subdivisions)}"
                         class="card-footer bg-transparent border-top-0 px-2 pb-2 pt-0">

                        <button class="btn btn-link btn-sm p-0 text-decoration-none w-100 country-toggle"
                                th:data-target="'#details-' + ${country.isoCode}">
                            <i class="bi bi-chevron-down me-1 toggle-icon"></i>Détails
                        </button>

                        <div th:id="'details-' + ${country.isoCode}" class="country-details mt-2" style="display:none;">

                            <!-- France departments -->
                            <div th:if="${country.isoCode == 'FR' and not #lists.isEmpty(country.subdivisions)}">
                                <div class="fw-semibold x-small text-muted mb-1" style="font-size:0.7rem;">DÉPARTEMENTS</div>
                                <div class="d-flex flex-wrap gap-1">
                                    <span class="badge bg-info text-dark"
                                          th:each="dept : ${country.subdivisions}"
                                          th:text="${dept}"></span>
                                </div>
                            </div>

                            <!-- USA states -->
                            <div th:if="${country.isoCode == 'US' and not #lists.isEmpty(country.subdivisions)}">
                                <div class="fw-semibold x-small text-muted mb-1" style="font-size:0.7rem;">ÉTATS</div>
                                <div class="d-flex flex-wrap gap-1">
                                    <span class="badge bg-warning text-dark"
                                          th:each="state : ${country.subdivisions}"
                                          th:text="${state}"></span>
                                </div>
                            </div>

                            <!-- Sources -->
                            <div class="mt-2">
                                <div class="fw-semibold text-muted mb-1" style="font-size:0.7rem;">SOURCES</div>
                                <ul class="list-unstyled mb-0">
                                    <li th:each="src : ${country.sources}"
                                        class="text-muted small d-flex align-items-start gap-1">
                                        <i class="bi bi-pin-map-fill text-primary mt-1" style="flex-shrink:0;font-size:0.65rem;"></i>
                                        <span th:text="${src}"></span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>

</th:block>

<th:block th:fragment="extraHead">
    <!-- Leaflet Map Library -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>
    
    <style>
        .country-card {
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .country-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.12) !important;
        }
        .flag-emoji {
            user-select: none;
        }
        .country-toggle {
            font-size: 0.75rem;
            color: #6c757d;
        }
        .country-toggle:hover {
            color: #0d6efd;
        }
        .toggle-icon {
            transition: transform 0.2s ease;
        }
        .toggle-icon.open {
            transform: rotate(180deg);
        }
        
        /* World Map Styles */
        #worldMap {
            height: 500px;
            border-radius: 12px;
            border: 1px solid #dee2e6;
            margin-bottom: 2rem;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
        
        .trip-marker {
            font-size: 28px;
        }
        
        .marker-popup {
            min-width: 180px;
        }
        
        .marker-popup img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 6px;
        }
        
        .marker-popup strong {
            display: block;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }

        .marker-popup .location-label {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 6px;
        }
        
        .marker-popup .marker-type-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 3px;
            background-color: #e9ecef;
            color: #495057;
            margin-bottom: 6px;
        }
    </style>
</th:block>

<th:block th:fragment="extraScripts">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    
    <script>
        // Initialize world map with trip markers
        document.addEventListener('DOMContentLoaded', function() {
            console.log('=== World Map Initialization ===');
            
            const mapElement = document.getElementById('worldMap');
            if (!mapElement) {
                console.error('Map element not found!');
                return;
            }
            
            const markersJson = mapElement.dataset.markers || '[]';
            console.log('Markers JSON length:', markersJson.length);
            console.log('Markers JSON (first 500 chars):', markersJson.substring(0, 500));
            
            let markers = [];
            try {
                markers = JSON.parse(markersJson);
                console.log('Successfully parsed', markers.length, 'markers');
                markers.forEach((m, idx) => {
                    console.log(`Marker ${idx}:`, m.tripName, `(${m.latitude}, ${m.longitude})`);
                });
            } catch (e) {
                console.error('Failed to parse markers JSON:', e);
                console.error('Raw JSON:', markersJson);
                markers = [];
            }
            
            if (markers.length === 0) {
                console.log('No markers to display on map');
                return;
            }
            
            try {
                // Create map
                console.log('Creating map...');
                const worldMap = L.map('worldMap').setView([20, 10], 2);
                console.log('Map created successfully');
                
                // Add OpenStreetMap tile layer
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                    maxZoom: 19
                }).addTo(worldMap);
                console.log('Tile layer added');
                
                // Create marker cluster group
                const markerClusterGroup = L.markerClusterGroup({
                    maxClusterRadius: 50
                });
                console.log('Marker cluster group created');
                
                // Group markers by trip
                const markersByTrip = {};
                let addedMarkerCount = 0;
                
                markers.forEach(function(markerData) {
                    if (!markerData.latitude || !markerData.longitude) {
                        console.warn('Skipping marker with no coordinates:', markerData.title);
                        return;
                    }
                    
                    // Create custom HTML icon based on marker type
                    const iconHtml = markerData.markerType === 'event' ? '📍' : '🚩';
                    
                    // Create popup HTML
                    let popupHtml = '<div class="marker-popup">';
                    
                    if (markerData.tripImageUrl) {
                        popupHtml += '<img src="' + markerData.tripImageUrl + '" alt="Trip image" onerror="this.style.display=\'none\'"/>';
                    }
                    
                    popupHtml += '<strong>' + escapeHtml(markerData.tripName) + '</strong>';
                    
                    if (markerData.markerType === 'event') {
                        popupHtml += '<div class="marker-type-badge">📍 Étape</div>';
                        if (markerData.eventName) {
                            popupHtml += '<div class="location-label"><strong>' + escapeHtml(markerData.eventName) + '</strong></div>';
                        }
                    }
                    
                    if (markerData.location) {
                        popupHtml += '<div class="location-label"><i class="bi bi-geo-alt"></i> ' + escapeHtml(markerData.location) + '</div>';
                    }
                    
                    popupHtml += '<a href="/trips/' + markerData.tripId + '" class="btn btn-sm btn-primary mt-2" style="font-size:0.75rem;"><i class="bi bi-eye me-1"></i>Détails</a>';
                    popupHtml += '</div>';
                    
                    // Create marker with custom icon
                    const marker = L.marker([markerData.latitude, markerData.longitude], {
                        icon: L.divIcon({
                            className: 'trip-marker',
                            html: iconHtml,
                            iconSize: [28, 28],
                            iconAnchor: [14, 28],
                            popupAnchor: [0, -28]
                        })
                    });
                    
                    marker.bindPopup(popupHtml);
                    markerClusterGroup.addLayer(marker);
                    addedMarkerCount++;
                    
                    // Track latitude/longitude for map bounds
                    if (!markersByTrip[markerData.tripId]) {
                        markersByTrip[markerData.tripId] = [];
                    }
                    markersByTrip[markerData.tripId].push(marker);
                });
                
                console.log('Added', addedMarkerCount, 'markers to cluster group');
                
                // Add marker cluster group to map
                worldMap.addLayer(markerClusterGroup);
                console.log('Marker group added to map');
                
                // Fit map to all markers bounds
                if (markerClusterGroup.getLayers().length > 0) {
                    console.log('Fitting map bounds for', markerClusterGroup.getLayers().length, 'markers');
                    if (markerClusterGroup.getLayers().length === 1) {
                        // Single marker: zoom in closer
                        const coords = markerClusterGroup.getLayers()[0].getLatLng();
                        console.log('Single marker at', coords);
                        worldMap.setView([coords.lat, coords.lng], 6);
                    } else {
                        // Multiple markers: fit to bounds
                        const bounds = markerClusterGroup.getBounds();
                        console.log('Bounds:', bounds);
                        worldMap.fitBounds(bounds, { padding: [50, 50] });
                    }
                }
                console.log('Map initialization completed successfully');
            } catch (e) {
                console.error('Error initializing map:', e);
                console.error('Stack trace:', e.stack);
            }
            
            // Helper function to escape HTML
            function escapeHtml(text) {
                if (!text) return '';
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return String(text).replace(/[&<>"']/g, m => map[m]);
            }
        });
        
        // Toggle country details
        document.querySelectorAll('.country-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const target = document.querySelector(btn.getAttribute('data-target'));
                if (!target) return;
                const isOpen = target.style.display !== 'none';
                target.style.display = isOpen ? 'none' : 'block';
                btn.querySelector('.toggle-icon').classList.toggle('open', !isOpen);
            });
        });
    </script>
</th:block>

</body>
</html>
