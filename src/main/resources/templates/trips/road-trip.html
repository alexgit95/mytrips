<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr"
      th:replace="~{fragments/layout :: layout(pageTitle='Road Trip – ' + ${trip.name},
                                               content=~{::content},
                                               extraHead=~{::extraHead},
                                               extraScripts=~{::extraScripts})}">
<head></head>
<body>

<!-- ===================== EXTRA HEAD ===================== -->
<th:block th:fragment="extraHead">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        #road-trip-map {
            height: 60vh;
            min-height: 400px;
            border-radius: 0.75rem;
            border: 1px solid #dee2e6;
            box-shadow: 0 4px 20px rgba(0,0,0,.1);
        }

        /* Bouton de zoom Leaflet */
        .leaflet-control-zoom a {
            font-size: 1rem !important;
        }

        /* Marqueur de départ / d'arrivée */
        .rt-marker-label {
            background: transparent;
            border: none;
            font-size: .72rem;
            font-weight: 600;
            color: #212529;
            white-space: nowrap;
        }

        /* Distance badge */
        #distance-card {
            border-left: 4px solid #fd7e14;
        }

        /* Légende de l'itinéraire */
        #waypoint-list .step-num {
            width: 28px;
            height: 28px;
            min-width: 28px;
            border-radius: 50%;
            background: #fd7e14;
            color: #fff;
            font-weight: 700;
            font-size: .8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #waypoint-list .step-line {
            width: 2px;
            background: linear-gradient(to bottom, #fd7e14, #0d6efd);
            min-height: 24px;
            margin: 0 auto;
        }
    </style>
</th:block>

<!-- ===================== CONTENT ===================== -->
<th:block th:fragment="content">

    <!-- Données JSON pour le JS -->
    <div id="rt-data"
         th:attr="data-waypoints=${waypointsJson},
                  data-trip-name=${trip.name},
                  data-is-abroad=${isAbroad},
                  data-home-country=${homeCountry}"
         style="display:none"></div>

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/trips}">Voyages</a></li>
            <li class="breadcrumb-item"><a th:href="@{/trips/{id}(id=${trip.id})}" th:text="${trip.name}">Voyage</a></li>
            <li class="breadcrumb-item active">Road Trip</li>
        </ol>
    </nav>

    <!-- En-tête -->
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
        <div>
            <h2 class="mb-1 fw-bold">
                <i class="bi bi-sign-turn-right me-2 text-warning"></i>Road Trip
                <span class="h4 fw-normal text-muted ms-2" th:text="${trip.name}"></span>
            </h2>
            <p class="text-muted small mb-0">
                <i class="bi bi-calendar3 me-1"></i>
                <span th:text="${#temporals.format(trip.startDate, 'dd MMMM yyyy')}"></span>
                &rarr;
                <span th:text="${#temporals.format(trip.endDate, 'dd MMMM yyyy')}"></span>
                <span th:if="${isAbroad}" class="ms-2 badge bg-info text-dark">
                    <i class="bi bi-filter me-1"></i>Points du pays d'origine (<span th:text="${homeCountry}"></span>) exclus
                </span>
            </p>
        </div>
        <a th:href="@{/trips/{id}(id=${trip.id})}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Retour au voyage
        </a>
    </div>

    <!-- Alertes JS -->
    <div id="rt-alert" class="alert alert-warning d-none mb-3" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span id="rt-alert-msg"></span>
    </div>

    <!-- Carte -->
    <div id="road-trip-map" class="mb-4"></div>

    <!-- Carte distance + stats -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card shadow-sm h-100" id="distance-card">
                <div class="card-body d-flex align-items-center gap-3">
                    <i class="bi bi-speedometer2 display-5 text-warning"></i>
                    <div>
                        <div class="text-muted small fw-semibold">Distance totale estimée</div>
                        <div class="fs-3 fw-bold" id="total-distance">Calcul…</div>
                        <div class="text-muted small" id="distance-note">Via les routes principales</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <i class="bi bi-geo-alt-fill display-5 text-primary"></i>
                    <div>
                        <div class="text-muted small fw-semibold">Étapes affichées</div>
                        <div class="fs-3 fw-bold" id="nb-waypoints">—</div>
                        <div class="text-muted small">points GPS actifs</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <i class="bi bi-clock-history display-5 text-success"></i>
                    <div>
                        <div class="text-muted small fw-semibold">Durée du voyage</div>
                        <div class="fs-3 fw-bold" id="trip-duration">—</div>
                        <div class="text-muted small">jours</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Liste des étapes -->
    <div class="card shadow-sm">
        <div class="card-header">
            <h6 class="mb-0"><i class="bi bi-list-ol me-2 text-warning"></i>Itinéraire détaillé</h6>
        </div>
        <div class="card-body p-3">
            <div id="waypoint-list" class="d-flex flex-column gap-0">
                <!-- Généré par JS -->
            </div>
        </div>
    </div>

</th:block>

<!-- ===================== EXTRA SCRIPTS ===================== -->
<th:block th:fragment="extraScripts">
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script th:inline="javascript">
/*<![CDATA[*/
(function () {

    /* ─── Données serveur ───────────────────────────────────────────────────── */
    const rtDataEl   = document.getElementById('rt-data');
    const waypoints  = JSON.parse(rtDataEl.dataset.waypoints || '[]');
    const isAbroad   = rtDataEl.dataset.isAbroad === 'true';

    /* ─── Stats rapides ─────────────────────────────────────────────────────── */
    document.getElementById('nb-waypoints').textContent = waypoints.length;

    // Durée du voyage (start/end depuis les dates des waypoints)
    if (waypoints.length >= 2) {
        const dates = waypoints.map(w => new Date(w.date)).sort((a,b) => a-b);
        const diffDays = Math.round((dates[dates.length-1] - dates[0]) / 86400000) + 1;
        document.getElementById('trip-duration').textContent = diffDays;
    }

    /* ─── Alerte aucun point ────────────────────────────────────────────────── */
    if (waypoints.length === 0) {
        showAlert("Aucun point GPS disponible pour ce voyage (assurez-vous que le géocodage est activé dans l'administration).");
        document.getElementById('total-distance').textContent = '—';
        document.getElementById('nb-waypoints').textContent = '0';
        document.getElementById('trip-duration').textContent = '—';
    }

    /* ─── Carte Leaflet ─────────────────────────────────────────────────────── */
    const map = L.map('road-trip-map', {zoomControl: true});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19
    }).addTo(map);

    if (waypoints.length === 0) {
        map.setView([46.2, 2.2], 5);
        return;
    }

    /* ─── Marqueurs ─────────────────────────────────────────────────────────── */
    const colors = generateGradientColors(waypoints.length, '#fd7e14', '#0d6efd');

    waypoints.forEach(function (wp, i) {
        const color = colors[i];
        const isFirst = i === 0;
        const isLast  = i === waypoints.length - 1;

        // Icône SVG colorée
        const svgIcon = L.divIcon({
            className: '',
            html: `<svg width="28" height="38" viewBox="0 0 28 38" xmlns="http://www.w3.org/2000/svg">
                     <path d="M14 0C6.27 0 0 6.27 0 14c0 9.9 14 24 14 24S28 23.9 28 14C28 6.27 21.73 0 14 0z"
                           fill="${color}" stroke="#fff" stroke-width="2"/>
                     <text x="14" y="18" text-anchor="middle" dominant-baseline="middle"
                           fill="white" font-size="11" font-weight="bold">${i + 1}</text>
                   </svg>`,
            iconSize: [28, 38],
            iconAnchor: [14, 38],
            popupAnchor: [0, -38]
        });

        const marker = L.marker([wp.lat, wp.lng], {icon: svgIcon}).addTo(map);
        const badge  = isFirst ? '🚀 Départ' : (isLast ? '🏁 Arrivée' : `Étape ${i + 1}`);
        marker.bindPopup(
            `<strong>${escapeHtml(wp.name)}</strong><br/>
             <span class="text-muted small">${escapeHtml(wp.location || '')}</span><br/>
             <span class="badge bg-secondary mt-1">${badge}</span><br/>
             <span class="text-muted small">${wp.date}</span>`
        );
    });

    /* ─── Itinéraire OSRM ───────────────────────────────────────────────────── */
    if (waypoints.length >= 2) {
        fetchOsrmRoute(waypoints);
    } else {
        // Un seul point : juste centrer
        map.setView([waypoints[0].lat, waypoints[0].lng], 12);
        document.getElementById('total-distance').textContent = '—';
        document.getElementById('distance-note').textContent  = 'Un seul point disponible';
    }

    /* ─── Liste des étapes ───────────────────────────────────────────────────── */
    buildWaypointList(waypoints);

    /* ══════════════════════════════════════════════════════════════════════════ */
    /*  FONCTIONS                                                                 */
    /* ══════════════════════════════════════════════════════════════════════════ */

    function fetchOsrmRoute(wps) {
        // Construire l'URL OSRM avec tous les waypoints
        const coords = wps.map(w => w.lng + ',' + w.lat).join(';');
        const url = `https://router.project-osrm.org/route/v1/driving/${coords}` +
                    `?overview=full&geometries=geojson&steps=false`;

        fetch(url)
            .then(r => {
                if (!r.ok) throw new Error('OSRM HTTP ' + r.status);
                return r.json();
            })
            .then(data => {
                if (data.code !== 'Ok' || !data.routes || data.routes.length === 0) {
                    throw new Error('Aucun itinéraire trouvé');
                }
                const route = data.routes[0];
                drawRoute(route.geometry.coordinates, route.distance);
            })
            .catch(err => {
                console.warn('OSRM routing échoué, tracé en ligne droite :', err);
                drawFallbackPolyline(wps);
            });
    }

    function drawRoute(coords, distanceMeters) {
        // coords provient de GeoJSON [lng, lat]
        const latLngs = coords.map(c => [c[1], c[0]]);

        // Dégradé : tracer segment par segment
        const segments = splitIntoSegments(latLngs, 200);
        segments.forEach(function(seg, i) {
            const ratio  = segments.length > 1 ? i / (segments.length - 1) : 0;
            const color  = lerpColor('#fd7e14', '#0d6efd', ratio);
            L.polyline(seg, {
                color:     color,
                weight:    5,
                opacity:   0.88,
                lineJoin:  'round',
                lineCap:   'round'
            }).addTo(map);
        });

        // Flèches directionnelles
        addDirectionArrows(latLngs);

        // Fit bounds
        const bounds = L.latLngBounds(latLngs);
        map.fitBounds(bounds, {padding: [40, 40]});

        // Distance
        const km = (distanceMeters / 1000).toFixed(0);
        document.getElementById('total-distance').textContent = km + ' km';
        document.getElementById('distance-note').textContent  = 'Distance routière calculée via OSRM';
    }

    function drawFallbackPolyline(wps) {
        // Tracé en ligne droite avec calcul haversine
        const latLngs = wps.map(w => [w.lat, w.lng]);
        let totalKm   = 0;

        for (let i = 0; i < latLngs.length - 1; i++) {
            const ratio = wps.length > 1 ? i / (wps.length - 1) : 0;
            const color = lerpColor('#fd7e14', '#0d6efd', ratio);
            L.polyline([latLngs[i], latLngs[i+1]], {
                color:     color,
                weight:    4,
                opacity:   0.8,
                dashArray: '10 6'
            }).addTo(map);
            totalKm += haversineKm(latLngs[i][0], latLngs[i][1], latLngs[i+1][0], latLngs[i+1][1]);
        }

        addDirectionArrows(latLngs);
        const bounds = L.latLngBounds(latLngs);
        map.fitBounds(bounds, {padding: [40, 40]});
        document.getElementById('total-distance').textContent = Math.round(totalKm) + ' km';
        document.getElementById('distance-note').textContent  = 'Distance à vol d\'oiseau (routage OSRM indisponible)';
        showAlert('Le calcul d\'itinéraire routier est temporairement indisponible. La distance affichée est estimée à vol d\'oiseau.');
    }

    function addDirectionArrows(latLngs) {
        if (latLngs.length < 2) return;
        // Ajouter des petits triangles indiquant la direction, tous les ~20 points
        const step = Math.max(1, Math.floor(latLngs.length / 20));
        for (let i = step; i < latLngs.length; i += step) {
            const from = latLngs[i - 1];
            const to   = latLngs[i];
            const angle = Math.atan2(to[1] - from[1], to[0] - from[0]) * 180 / Math.PI - 90;
            const mid   = [(from[0] + to[0]) / 2, (from[1] + to[1]) / 2];
            L.marker(mid, {
                icon: L.divIcon({
                    className: '',
                    html: `<div style="transform:rotate(${angle.toFixed(0)}deg);color:#fd7e14;font-size:12px;opacity:.75;">▲</div>`,
                    iconSize: [14, 14],
                    iconAnchor: [7, 7]
                }),
                interactive: false
            }).addTo(map);
        }
    }

    function splitIntoSegments(latLngs, segSize) {
        const segs = [];
        for (let i = 0; i < latLngs.length - 1; i += segSize) {
            segs.push(latLngs.slice(i, i + segSize + 1));
        }
        return segs.length ? segs : [latLngs];
    }

    function buildWaypointList(wps) {
        const container = document.getElementById('waypoint-list');
        if (!wps.length) {
            container.innerHTML = '<p class="text-muted text-center py-3">Aucune étape à afficher.</p>';
            return;
        }
        wps.forEach(function (wp, i) {
            const isLast = i === wps.length - 1;
            const step   = document.createElement('div');
            step.className = 'd-flex align-items-start gap-3 py-2';

            step.innerHTML = `
                <div class="d-flex flex-column align-items-center">
                    <div class="step-num">${i + 1}</div>
                    ${!isLast ? '<div class="step-line flex-grow-1" style="height:24px"></div>' : ''}
                </div>
                <div class="pb-1">
                    <div class="fw-semibold">${escapeHtml(wp.name)}</div>
                    <div class="text-muted small">${escapeHtml(wp.location || '')}</div>
                    <div class="text-muted small"><i class="bi bi-calendar3 me-1"></i>${wp.date}</div>
                </div>`;
            container.appendChild(step);
        });
    }

    /* ─── Utilitaires ────────────────────────────────────────────────────────── */

    function lerpColor(hex1, hex2, t) {
        const r1 = parseInt(hex1.slice(1,3),16), g1 = parseInt(hex1.slice(3,5),16), b1 = parseInt(hex1.slice(5,7),16);
        const r2 = parseInt(hex2.slice(1,3),16), g2 = parseInt(hex2.slice(3,5),16), b2 = parseInt(hex2.slice(5,7),16);
        const r  = Math.round(r1 + (r2-r1)*t).toString(16).padStart(2,'0');
        const g  = Math.round(g1 + (g2-g1)*t).toString(16).padStart(2,'0');
        const b  = Math.round(b1 + (b2-b1)*t).toString(16).padStart(2,'0');
        return '#' + r + g + b;
    }

    function generateGradientColors(n, start, end) {
        return Array.from({length: n}, (_, i) => lerpColor(start, end, n > 1 ? i / (n-1) : 0));
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
        const R  = 6371;
        const dL = (lat2-lat1) * Math.PI / 180;
        const dG = (lon2-lon1) * Math.PI / 180;
        const a  = Math.sin(dL/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dG/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function showAlert(msg) {
        const el  = document.getElementById('rt-alert');
        const txt = document.getElementById('rt-alert-msg');
        txt.textContent = msg;
        el.classList.remove('d-none');
    }

})();
/*]]>*/
</script>
</th:block>

</body>
</html>
