name: Build and Push Docker Image

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
    branches:
      - main

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run tests with JaCoCo
        run: ./mvnw -B clean test

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/

  build-and-push:
    runs-on: ubuntu-latest
    needs: test-and-coverage
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute branch tag
        id: branch_tag
        if: startsWith(github.ref, 'refs/heads/') && github.ref != 'refs/heads/master'
        shell: bash
        run: |
          BRANCH_TAG=$(echo "${GITHUB_REF_NAME}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's#[^a-z0-9_.-]+#-#g; s#^[.-]+##; s#[.-]+$##; s#[-.]{2,}#-#g')
          echo "value=$BRANCH_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push – branch (tag = branch name)
        if: startsWith(github.ref, 'refs/heads/') && github.ref != 'refs/heads/master'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mytrips:${{ steps.branch_tag.outputs.value }}

      - name: Build and push – master (tag = latest)
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mytrips:latest

      - name: Build and push – git tag (tag = version + latest)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mytrips:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/mytrips:latest
