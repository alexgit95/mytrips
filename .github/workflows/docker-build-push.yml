name: Build and Push Docker Image

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
    branches:
      - main

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run tests with JaCoCo
        run: ./mvnw -B clean test

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  build-and-push:
    runs-on: ubuntu-latest
    needs: test-and-coverage
    if: github.event_name == 'push'
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/mytrips

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute Docker tag from branch name
        id: branch_tag
        if: startsWith(github.ref, 'refs/heads/')
        shell: bash
        run: |
          BRANCH_TAG=$(echo "${GITHUB_REF_NAME}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's#[^a-z0-9_.-]+#-#g; s#^[.-]+##; s#[.-]+$##; s#[-.]{2,}#-#g')

          if [ -z "$BRANCH_TAG" ]; then
            echo "Unable to derive a valid Docker tag from branch '${GITHUB_REF_NAME}'" >&2
            exit 1
          fi

          echo "value=$BRANCH_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push branch image
        if: startsWith(github.ref, 'refs/heads/')
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.branch_tag.outputs.value }}

      - name: Build and push latest (master branch)
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

      - name: Build and push version tag (git tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest
